<!DOCTYPE html>
<html>
<head>
  <title>Contoh jQuery</title>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <style>
    #pesan {
      display: none;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

<button id="tombol">Tampilkan Pesan</button>
<p id="pesan">Halo! Ini pesan dari jQuery.</p>

<script>
  $(document).ready(function() {
    $("#tombol").click(function() {
      $("#pesan").toggle(); // toggle = tampilkan/sembunyikan
    });
  });
</script>

</body>
</html>
