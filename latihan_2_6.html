<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Div dan Span</title>
    <link rel="icon" type="img/png" href="gambar/icon.png" sizes="16x16"/>
</head>
<body>

    <div id="header">
        <!-- Isi header disini -->
    </div>

    <div id="main">
        <div id="link">
            <!-- Isi link disini -->
        </div>

        <div id="content">
            <!-- Isi content disini -->
             <img  src="gambar/workplace.jpg" alt="workplace" usemap="#petagambar">
             
             <map name="petagambar">
                <area shape="rect" coords="34, 44, 270, 350" alt="Computer" href="https://en.wikipedia.org/wiki/Computer">
                <area shape="rect" coords="290, 172, 333, 250" alt="Phone" href="https://en.wikipedia.org/wiki/Telephone">
                <area shape="rect" coords="337, 300, 44" alt="Coffee" href="https://en.wikipedia.org/wiki/Coffee">
             </map>
        </div>
    </div>

    <div id="footer">
        <!-- Isi footer disini -->
    </div>

</body>
</html>
