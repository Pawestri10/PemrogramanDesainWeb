<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Pseudo-class selectors</title>

        <style>
           p {
            display: none;
            background-color: darkgray;
            padding: 20px;
           }

           div:hover p {
            display: block;
           }

           a {
            display: none;
            background-color: pink;
            padding: 20px;
            color: black;
           }

           div:hover a {
            display: block;
           }
        </style>

    </head>

    <body>
        <header>
            <h1>Pseudo-class selectors</h1>
        </header>

       <div> Letakkan kusrsor disini untuk melihat div element
            <p>Saya adalah element</p>
            <a href="LINK">LINK</a>
       </div>
       
    </body>
</html>
